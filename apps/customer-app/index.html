<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KhidmatAI — Your AI Service Assistant</title>
    <meta name="description" content="KhidmatAI connects you with trusted local service providers in Pakistan. Find plumbers, electricians, AC technicians and more — powered by AI." />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Tailwind CDN (matching Stitch config) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#f9f9fc",
              "on-surface": "#1a1c1e",
              "on-secondary": "#ffffff",
              "tertiary": "#735c00",
              "on-primary": "#ffffff",
              "secondary": "#57605d",
              "primary-fixed": "#9ff6b4",
              "on-background": "#1a1c1e",
              "secondary-container": "#d9e2dd",
              "on-secondary-container": "#5c6561",
              "error": "#ba1a1a",
              "surface-variant": "#e2e2e5",
              "inverse-surface": "#2f3133",
              "surface-container-low": "#f3f3f6",
              "on-primary-container": "#8ce1a1",
              "tertiary-fixed-dim": "#e9c349",
              "secondary-fixed": "#dce5e0",
              "primary-fixed-dim": "#84d999",
              "outline": "#6f7a6f",
              "tertiary-fixed": "#ffe088",
              "on-error-container": "#93000a",
              "secondary-fixed-dim": "#bfc9c4",
              "tertiary-container": "#cba72f",
              "surface-container-highest": "#e2e2e5",
              "inverse-on-surface": "#f0f0f3",
              "inverse-primary": "#84d999",
              "surface-dim": "#dadadc",
              "primary": "#004b24",
              "surface-container": "#eeeef0",
              "surface-bright": "#f9f9fc",
              "on-primary-fixed": "#00210c",
              "surface-tint": "#0f6d39",
              "surface-container-lowest": "#ffffff",
              "outline-variant": "#bfc9bd",
              "error-container": "#ffdad6",
              "on-error": "#ffffff",
              "on-primary-fixed-variant": "#005228",
              "primary-container": "#006633",
              "on-tertiary": "#ffffff",
              "background": "#f9f9fc",
              "surface-container-high": "#e8e8ea",
              "on-surface-variant": "#3f4940",
            },
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
            },
            spacing: {
              "container-padding-mobile": "20px",
              "container-padding-desktop": "40px",
              "gutter": "16px",
              "stack-sm": "12px",
              "stack-md": "24px",
              "stack-lg": "48px",
            }
          }
        }
      }
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; background: #f9f9fc; }
      .glass-panel {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.4);
      }
      .ai-gradient-text {
        background: linear-gradient(135deg, #004b24 0%, #cba72f 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .ambient-shadow { box-shadow: 0 20px 40px rgba(0, 75, 36, 0.1); }
      .ai-glow {
        box-shadow: 0 0 40px 10px rgba(0, 75, 36, 0.1);
        border: 1px solid #004b24;
      }
      .premium-btn {
        background: linear-gradient(180deg, #004b24 0%, #006633 100%);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 8px 24px rgba(0,75,36,0.25);
      }
      .ai-glow-wave {
        background: linear-gradient(90deg, rgba(0,75,36,0) 0%, rgba(159,246,180,0.5) 50%, rgba(0,75,36,0) 100%);
        filter: blur(8px);
      }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      .animate-float { animation: float 3s ease-in-out infinite; }
      @keyframes pulse-glow { 0%,100%{opacity:0.6} 50%{opacity:1} }
      .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
